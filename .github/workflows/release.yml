name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          case "$RELEASE_TAG" in
            v*) VERSION=${RELEASE_TAG#v} ;;
            *) echo "release tag must be vX.Y.Z" >&2; exit 1 ;;
          esac
          ./scripts/validate-release-version.sh "$VERSION"
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "release tag must point to a commit on main" >&2
            exit 1
          }
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v7
        with:
          go-version: 1.24.x
          cache: true
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Validate release scripts
        run: |
          sh -n scripts/install.sh
          ./scripts/test-release-version.sh
          ./scripts/test-install.sh
      - name: Test release commit
        run: |
          make test
          go test -race ./...
      - name: Build release artifacts with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --skip=publish
      - name: Verify release artifacts
        run: |
          sh scripts/prepare-release-artifacts.sh
          make verify-release-artifacts

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/shadoc_linux_amd64
            dist/shadoc_linux_arm64
            dist/shadoc_darwin_amd64
            dist/shadoc_darwin_arm64
            dist/shadoc-agent-linux-amd64
            dist/shadoc-agent-linux-arm64
            dist/shadoc-agent-darwin-amd64
            dist/shadoc-agent-darwin-arm64
            dist/shadoc-agent-windows-amd64.exe
            dist/shadoc-agent-windows-arm64.exe
            dist/install.sh
            dist/LICENSE
            dist/SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            dist/shadoc_linux_amd64 \
            dist/shadoc_linux_arm64 \
            dist/shadoc_darwin_amd64 \
            dist/shadoc_darwin_arm64 \
            dist/shadoc-agent-linux-amd64 \
            dist/shadoc-agent-linux-arm64 \
            dist/shadoc-agent-darwin-amd64 \
            dist/shadoc-agent-darwin-arm64 \
            dist/shadoc-agent-windows-amd64.exe \
            dist/shadoc-agent-windows-arm64.exe \
            dist/install.sh \
            dist/LICENSE \
            dist/SHA256SUMS \
            --verify-tag \
            --title "Shadoc $VERSION" \
            --generate-notes
